<!DOCTYPE html>
<html lang="en" data-theme="sage">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Field Service Tracker</title>
<style>
  :root{
    --radius-lg: 28px;
    --radius-md: 18px;
    --radius-sm: 12px;
    --font-display: Arial, Helvetica, 'Segoe UI', sans-serif;
    --font-body: Arial, Helvetica, 'Segoe UI', sans-serif;
  }

  /* ---------- THEMES ---------- */
  html[data-theme="sage"]{
    --bg-grad: linear-gradient(165deg, #eef4ea 0%, #dde9d7 45%, #c7dcc0 100%);
    --glass-bg: rgba(255,255,255,0.40);
    --glass-bg-strong: rgba(255,255,255,0.60);
    --glass-border: rgba(255,255,255,0.65);
    --shadow-col: rgba(58,74,46,0.18);
    --accent: #5f8a4e;
    --accent-2: #7fa66c;
    --accent-soft: rgba(95,138,78,0.16);
    --text: #263a20;
    --text-muted: #5a6e51;
    --input-bg: rgba(255,255,255,0.55);
    --blob1: #a9cf95; --blob2: #d7e8b8; --blob3: #8fbf9a;
  }
  html[data-theme="ocean"]{
    --bg-grad: linear-gradient(165deg, #e3f2f5 0%, #bfe1ea 45%, #91c4d6 100%);
    --glass-bg: rgba(255,255,255,0.38);
    --glass-bg-strong: rgba(255,255,255,0.60);
    --glass-border: rgba(255,255,255,0.65);
    --shadow-col: rgba(18,54,68,0.20);
    --accent: #1c7089;
    --accent-2: #2f92ab;
    --accent-soft: rgba(28,112,137,0.16);
    --text: #0f2f39;
    --text-muted: #3f6774;
    --input-bg: rgba(255,255,255,0.55);
    --blob1: #7fc6d8; --blob2: #bfe8ee; --blob3: #4fa3bd;
  }
  html[data-theme="earth"]{
    --bg-grad: linear-gradient(165deg, #f7ece0 0%, #eed7bb 45%, #dcb98d 100%);
    --glass-bg: rgba(255,255,255,0.38);
    --glass-bg-strong: rgba(255,255,255,0.60);
    --glass-border: rgba(255,255,255,0.60);
    --shadow-col: rgba(84,54,24,0.20);
    --accent: #b1602e;
    --accent-2: #c97e42;
    --accent-soft: rgba(177,96,46,0.16);
    --text: #3d2a19;
    --text-muted: #715a41;
    --input-bg: rgba(255,255,255,0.55);
    --blob1: #e0b184; --blob2: #f0d3ab; --blob3: #c98a52;
  }
  html[data-theme="forest"]{
    --bg-grad: linear-gradient(165deg, #101b14 0%, #16261b 45%, #1c3324 100%);
    --glass-bg: rgba(255,255,255,0.06);
    --glass-bg-strong: rgba(255,255,255,0.10);
    --glass-border: rgba(255,255,255,0.14);
    --shadow-col: rgba(0,0,0,0.45);
    --accent: #6fcf8e;
    --accent-2: #8fe0a8;
    --accent-soft: rgba(111,207,142,0.16);
    --text: #e8f3ec;
    --text-muted: #a3bcac;
    --input-bg: rgba(255,255,255,0.07);
    --blob1: #2f5b3f; --blob2: #1c4a30; --blob3: #3d7350;
  }
  html[data-theme="pinkblack"]{
    --bg-grad: linear-gradient(165deg, #ffeef5 0%, #ffd7e8 45%, #ffbedb 100%);
    --glass-bg: rgba(255,255,255,0.45);
    --glass-bg-strong: rgba(255,255,255,0.65);
    --glass-border: rgba(255,255,255,0.7);
    --shadow-col: rgba(214,50,120,0.18);
    --accent: #ff4f9c;
    --accent-2: #ff8ec0;
    --accent-soft: rgba(255,79,156,0.16);
    --text: #1a1418;
    --text-muted: #7a5765;
    --input-bg: rgba(255,255,255,0.55);
    --blob1: #ffb6d9; --blob2: #ff8fc4; --blob3: #ffd6e8;
  }
  html[data-theme="mono"]{
    --bg-grad: linear-gradient(165deg, #ffffff 0%, #f4f4f4 45%, #e8e8e8 100%);
    --glass-bg: rgba(255,255,255,0.55);
    --glass-bg-strong: rgba(255,255,255,0.75);
    --glass-border: rgba(0,0,0,0.10);
    --shadow-col: rgba(0,0,0,0.12);
    --accent: #1a1a1a;
    --accent-2: #444444;
    --accent-soft: rgba(0,0,0,0.08);
    --text: #111111;
    --text-muted: #6b6b6b;
    --input-bg: rgba(0,0,0,0.045);
    --blob1: #e6e6e6; --blob2: #dcdcdc; --blob3: #efefef;
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html{ height:100%; background: var(--bg-grad); }
  body{
    margin:0;
    font-family: var(--font-body);
    background: var(--bg-grad);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    transition: background 0.5s ease, color 0.5s ease;
    overflow-x:hidden;
  }

  .bg-decor{ position:fixed; inset:0; z-index:-1; overflow:hidden; }
  .bg-decor span{ position:absolute; border-radius:50%; filter: blur(70px); opacity:0.55; }
  .bg-decor span:nth-child(1){ width:420px; height:420px; background:var(--blob1); top:-140px; left:-120px; animation: float1 22s ease-in-out infinite alternate; }
  .bg-decor span:nth-child(2){ width:380px; height:380px; background:var(--blob2); bottom:-160px; right:-100px; animation: float2 26s ease-in-out infinite alternate; }
  .bg-decor span:nth-child(3){ width:300px; height:300px; background:var(--blob3); top:38%; left:62%; animation: float3 19s ease-in-out infinite alternate; }
  @keyframes float1{ from{ transform: translate(0,0) scale(1); } to{ transform: translate(30px,40px) scale(1.08); } }
  @keyframes float2{ from{ transform: translate(0,0) scale(1); } to{ transform: translate(-25px,-30px) scale(1.05); } }
  @keyframes float3{ from{ transform: translate(0,0) scale(1); } to{ transform: translate(-20px,25px) scale(0.95); } }
  @media (prefers-reduced-motion: reduce){
    .bg-decor span{ animation: none; }
  }

  .glass{
    background: var(--glass-bg);
    backdrop-filter: blur(22px) saturate(160%);
    -webkit-backdrop-filter: blur(22px) saturate(160%);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg);
    box-shadow: 0 8px 32px var(--shadow-col);
  }

  .app{ max-width: 560px; margin: 0 auto; padding: 84px 16px 100px; }

  /* ---------- TOP BAR ---------- */
  .topbar{
    position: fixed; top:0; left:0; right:0; z-index: 30;
    display:flex; align-items:center; justify-content:space-between;
    flex-wrap: wrap; gap: 10px;
    padding: 14px 20px;
    border-radius: 0;
    border-left: none; border-right: none; border-top: none;
  }
  .brand{ display:flex; align-items:center; gap:8px; }
  .brand-mark{
    width:30px; height:30px; border-radius: 10px;
    background: linear-gradient(150deg, var(--accent), var(--accent-2));
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 2px 8px var(--accent-soft);
    flex-shrink:0;
  }
  .brand-mark svg{ width:16px; height:16px; }
  .brand-name{ font-family: var(--font-display); font-weight:700; font-size:15.5px; letter-spacing:-0.01em; line-height:1.15; white-space:nowrap; }

  .tabs{ display:flex; gap:4px; background: var(--input-bg); padding:4px; border-radius: 999px; border: 1px solid var(--glass-border); }
  .tab-btn{
    border:none; background:transparent; color: var(--text-muted);
    font-family: var(--font-body); font-weight:700; font-size:13px;
    padding: 7px 14px; border-radius:999px; cursor:pointer;
    transition: all 0.25s ease;
  }
  .tab-btn.active{ background: var(--accent); color:#fff; box-shadow: 0 2px 10px var(--accent-soft); }

  /* ---------- PANELS ---------- */
  .panel{ display:none; }
  .panel.active{ display:block; animation: panelIn 0.35s ease; }
  @keyframes panelIn{ from{ opacity:0; transform: translateY(6px);} to{opacity:1; transform:translateY(0);} }

  .panel-header{ display:flex; align-items:baseline; justify-content:space-between; margin: 4px 4px 14px; }
  .panel-title{ font-family: var(--font-display); font-size:26px; font-weight:700; letter-spacing:-0.01em; }
  .panel-eyebrow{ font-size:12px; font-weight:700; color: var(--text-muted); text-transform:uppercase; letter-spacing: 0.06em; }

  /* ---------- TOOLBAR ---------- */
  .toolbar{ display:flex; gap:10px; margin-bottom:16px; }
  .search-wrap{ flex:1; position:relative; }
  .search-wrap svg{ position:absolute; left:14px; top:50%; transform:translateY(-50%); width:16px; height:16px; opacity:0.55; pointer-events:none; }
  .search-input{
    width:100%; padding: 12px 14px 12px 38px; border-radius: var(--radius-md);
    border: 1px solid var(--glass-border); background: var(--input-bg); color: var(--text);
    font-family: var(--font-body); font-size:14px; font-weight:600; outline:none;
    transition: box-shadow 0.2s ease;
  }
  .search-input::placeholder{ color: var(--text-muted); font-weight:500; }
  .search-input:focus{ box-shadow: 0 0 0 3px var(--accent-soft); }

  .btn{
    font-family: var(--font-body); font-weight:700; font-size:14px; cursor:pointer;
    border-radius: 999px; border:none; padding: 12px 18px;
    display:inline-flex; align-items:center; gap:6px; white-space:nowrap;
    transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
  }
  .btn:active{ transform: scale(0.96); }
  .btn-primary{ background: var(--accent); color:#fff; box-shadow: 0 4px 14px var(--accent-soft); }
  .btn-primary:hover{ opacity:0.92; }
  .btn-ghost{ background: var(--input-bg); color: var(--text); border: 1px solid var(--glass-border); }
  .btn-danger{ background: rgba(220,80,80,0.14); color:#c23c3c; border:1px solid rgba(220,80,80,0.25); }
  html[data-theme="forest"] .btn-danger{ color:#ff8f8f; }
  .btn-sm{ padding: 9px 14px; font-size:13px; }
  .btn svg{ width:15px; height:15px; }
  #sort-toggle-btn{ padding: 12px; flex-shrink:0; }
  #sort-toggle-btn svg{ transition: transform 0.25s ease; }
  #sort-toggle-btn.asc svg{ transform: scaleY(-1); }

  /* ---------- ENTRY LIST ---------- */
  .entries{ display:flex; flex-direction:column; gap:10px; }
  .entry{ padding: 0; overflow:hidden; animation: cardIn 0.3s ease; }
  @keyframes cardIn{ from{opacity:0; transform: translateY(8px);} to{opacity:1; transform:translateY(0);} }

  .entry-row{ display:flex; align-items:center; gap:12px; padding: 14px 16px; cursor:pointer; }
  .badge{
    flex-shrink:0; width:42px; height:42px; border-radius:14px;
    background: linear-gradient(150deg, var(--accent), var(--accent-2));
    color:#fff; display:flex; align-items:center; justify-content:center;
    font-family: var(--font-display); font-weight:700; font-size:14px;
    box-shadow: 0 3px 10px var(--accent-soft);
  }
  .entry-main{ flex:1; min-width:0; }
  .entry-name{ font-family: var(--font-display); font-weight:600; font-size:16px; margin-bottom:2px; }
  .entry-sub{ font-size:12.5px; color: var(--text-muted); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .entry-dates{ display:flex; gap:6px; margin-top:6px; flex-wrap:wrap; }
  .tag{ font-size:11px; font-weight:700; padding:3px 8px; border-radius:999px; background: var(--accent-soft); color: var(--accent); }
  .chevron{ flex-shrink:0; width:18px; height:18px; color: var(--text-muted); transition: transform 0.25s ease; }
  .entry.open .chevron{ transform: rotate(180deg); }
  .row-action-btn{ flex-shrink:0; width:34px; height:34px; border-radius:50%; border:1px solid var(--glass-border); background: var(--input-bg); display:flex; align-items:center; justify-content:center; cursor:pointer; color: var(--accent); }
  .row-action-btn svg{ width:16px; height:16px; }

  .entry-form{ max-height:0; overflow:hidden; transition: max-height 0.35s ease; }
  .entry.open .entry-form{ max-height: 900px; }
  .entry-form-inner{ padding: 4px 16px 18px; border-top: 1px solid var(--glass-border); margin-top:2px; padding-top:16px; }

  .field-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px; }
  .field{ display:flex; flex-direction:column; gap:5px; }
  .field.full{ grid-column: 1 / -1; }
  .field label{ font-size:11px; font-weight:700; color: var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; padding-left:2px; }
  .field input[type=text], .field input[type=tel], .field textarea, .field-date-btn{
    width:100%; padding: 11px 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--glass-border); background: var(--input-bg); color: var(--text);
    font-family: var(--font-body); font-size:14px; font-weight:600; outline:none;
    transition: box-shadow 0.2s ease;
  }
  .field input:focus, .field textarea:focus{ box-shadow: 0 0 0 3px var(--accent-soft); }
  .field textarea{ resize:vertical; min-height:64px; font-weight:500; line-height:1.4; }
  .field-date-btn{ text-align:left; cursor:pointer; display:flex; align-items:center; justify-content:space-between; }
  .field-date-btn.empty{ color: var(--text-muted); font-weight:600; }
  .field-date-btn svg{ width:14px; height:14px; opacity:0.6; flex-shrink:0; }
  .input-with-action{ display:flex; gap:8px; align-items:center; }
  .input-with-action input{ flex:1; }
  .field-action-btn{ flex-shrink:0; width:42px; height:42px; border-radius: var(--radius-sm); border:1px solid var(--glass-border); background: var(--input-bg); color: var(--accent); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .field-action-btn svg{ width:17px; height:17px; }
  .visit-add-row{ display:flex; gap:8px; }

  .entry-actions{ display:flex; gap:8px; margin-top:14px; justify-content:flex-end; flex-wrap:wrap; }

  .visit-log{ display:flex; flex-direction:column; gap:6px; margin-bottom:6px; max-height:280px; overflow-y:auto; }
  .visit-empty{ font-size:12.5px; color: var(--text-muted); font-weight:600; padding:8px 2px; }

  .visit-panel-head{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:12px; }
  .visit-panel-title{ font-family: var(--font-display); font-weight:700; font-size:16px; }
  .icon-btn{ flex-shrink:0; width:36px; height:36px; border-radius:50%; border:1px solid var(--glass-border); background: var(--input-bg); color: var(--accent); display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .icon-btn svg{ width:16px; height:16px; }

  .new-visit-box{ margin-bottom:16px; padding-bottom:16px; border-bottom:1px solid var(--glass-border); }
  .general-notes-box{ margin-bottom:16px; padding:12px 14px; border-radius: var(--radius-sm); background: var(--accent-soft); border:1px solid var(--glass-border); }
  .general-notes-label{ font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color: var(--accent); margin-bottom:4px; }
  .general-notes-text{ font-size:13px; font-weight:500; line-height:1.5; color: var(--text); }
  .general-notes-text em{ color: var(--text-muted); font-weight:600; font-style:normal; opacity:0.9; }
  .new-visit-notes{ width:100%; padding:11px 12px; border-radius: var(--radius-sm); border:1px solid var(--glass-border); background: var(--input-bg); color: var(--text); font-family: var(--font-body); font-size:13.5px; font-weight:500; outline:none; resize:vertical; min-height:44px; margin-bottom:10px; }
  .new-visit-notes:focus{ box-shadow: 0 0 0 3px var(--accent-soft); }

  /* compact read-only visit rows (quick view) */
  .visit-row{ border-radius:10px; background: var(--input-bg); border:1px solid var(--glass-border); cursor:pointer; overflow:hidden; }
  .visit-row-head{ display:flex; align-items:center; gap:8px; padding:9px 10px; font-size:12.5px; font-weight:700; }
  .visit-row-head .visit-num{ color: var(--text-muted); }
  .visit-row-head .visit-date{ flex:1; }
  .visit-dot{ width:6px; height:6px; border-radius:50%; background: var(--accent); flex-shrink:0; }
  .visit-chevron{ width:13px; height:13px; color: var(--text-muted); transition: transform 0.2s ease; flex-shrink:0; }
  .visit-row.expanded .visit-chevron{ transform: rotate(180deg); }
  .visit-row-notes{ padding: 0 12px 12px; font-size:12.5px; font-weight:500; line-height:1.5; color: var(--text-muted); }
  .visit-row-notes em{ opacity:0.7; }

  /* editable visit items (edit mode) */
  .visit-edit-item{ border-radius:12px; background: var(--input-bg); border:1px solid var(--glass-border); padding:10px; }
  .visit-edit-head{ display:flex; align-items:center; gap:8px; margin-bottom:8px; font-size:12.5px; font-weight:700; }
  .visit-edit-head .visit-num{ color: var(--text-muted); }
  .visit-edit-head .visit-date{ flex:1; }
  .visit-notes-input{ width:100%; padding:9px 10px; border-radius:9px; border:1px solid var(--glass-border); background: var(--glass-bg-strong); color: var(--text); font-family: var(--font-body); font-size:13px; font-weight:500; outline:none; resize:vertical; min-height:40px; }
  .visit-notes-input:focus{ box-shadow: 0 0 0 3px var(--accent-soft); }
  .visit-del{ background:none; border:none; cursor:pointer; color: var(--text-muted); font-size:16px; line-height:1; padding:2px 6px; border-radius:6px; flex-shrink:0; }
  .visit-del:hover{ background: var(--accent-soft); color: var(--accent); }

  .empty-state{ text-align:center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state svg{ width:40px; height:40px; margin-bottom:12px; opacity:0.5; }
  .empty-state p{ font-weight:600; font-size:14px; max-width:260px; margin: 0 auto; }

  /* ---------- SETTINGS ---------- */
  .theme-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
  .theme-card{
    padding:16px; cursor:pointer; position:relative; display:flex; flex-direction:column; gap:10px;
    border: 2px solid transparent;
  }
  .theme-card.selected{ border-color: var(--accent); }
  .theme-preview{ height:44px; border-radius:12px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08); }
  .theme-name{ font-family: var(--font-display); font-weight:600; font-size:14px; }
  .theme-check{ position:absolute; top:10px; right:10px; width:20px; height:20px; border-radius:50%; background: var(--accent); display:flex; align-items:center; justify-content:center; opacity:0; transform: scale(0.6); transition: all 0.2s ease; }
  .theme-card.selected .theme-check{ opacity:1; transform:scale(1); }
  .theme-check svg{ width:12px; height:12px; color:#fff; }

  .settings-section-label{ font-size:12px; font-weight:700; color: var(--text-muted); text-transform:uppercase; letter-spacing:0.06em; margin: 22px 4px 10px; }
  .settings-card{ padding:16px; }
  .settings-row{ display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  .settings-row-title{ font-weight:700; font-size:14.5px; }
  .settings-row-sub{ font-size:12.5px; color: var(--text-muted); font-weight:600; margin-top:2px; }
  .backup-actions{ display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }

  /* ---------- CALENDAR POPOVER ---------- */
  .cal-popover{ position:fixed; width:264px; padding:14px; z-index:200; animation: calIn 0.18s ease; }
  @keyframes calIn{ from{opacity:0; transform:translateY(-6px);} to{opacity:1; transform:translateY(0);} }
  .cal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .cal-nav{ background: var(--input-bg); border:1px solid var(--glass-border); border-radius:8px; width:26px; height:26px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .cal-nav svg{ width:13px; height:13px; }
  .cal-label{ font-family: var(--font-display); font-weight:700; font-size:13.5px; }
  .cal-grid{ display:grid; grid-template-columns: repeat(7,1fr); gap:3px; text-align:center; }
  .cal-wd{ font-size:10px; font-weight:700; color: var(--text-muted); padding-bottom:4px; }
  .cal-day{ font-size:12.5px; font-weight:600; padding:6px 0; border-radius:8px; cursor:pointer; }
  .cal-day:hover{ background: var(--accent-soft); }
  .cal-day.dim{ opacity:0.32; }
  .cal-day.today{ box-shadow: inset 0 0 0 1.5px var(--accent); }
  .cal-day.selected{ background: var(--accent); color:#fff; }
  .cal-foot{ display:flex; justify-content:space-between; margin-top:10px; }
  .cal-foot button{ background:none; border:none; font-family: var(--font-body); font-size:12px; font-weight:700; color: var(--accent); cursor:pointer; padding:4px; }

  /* ---------- TOAST ---------- */
  .toast{
    position:fixed; bottom: 24px; left:50%; transform: translateX(-50%) translateY(20px);
    padding: 12px 20px; z-index:300; font-size:13px; font-weight:700;
    opacity:0; pointer-events:none; transition: all 0.3s ease;
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(0); }

  /* ---------- CONFIRM DIALOG ---------- */
  .overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.35); backdrop-filter: blur(4px); z-index:250; display:none; align-items:center; justify-content:center; padding:20px; }
  .overlay.show{ display:flex; }
  .confirm-box{ padding:22px; max-width:320px; width:100%; text-align:center; }
  .confirm-box p{ font-size:14px; font-weight:600; margin: 0 0 18px; color: var(--text); }
  .confirm-actions{ display:flex; gap:10px; justify-content:center; }

  ::selection{ background: var(--accent-soft); }
  button:focus-visible, input:focus-visible, textarea:focus-visible{ outline: 2px solid var(--accent); outline-offset: 2px; }
</style>
</head>
<body>

<div class="bg-decor"><span></span><span></span><span></span></div>

<div class="app">
  <div class="topbar glass">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M6 21V8l6-4 6 4v13"/><path d="M10 21v-6h4v6"/></svg>
      </div>
      <div class="brand-name">Field Service Tracker</div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="log">Log</button>
      <button class="tab-btn" data-tab="settings">Settings</button>
    </div>
  </div>

  <!-- LOG PANEL -->
  <div class="panel active" id="panel-log">
    <div class="panel-header">
      <div class="panel-eyebrow" id="entry-count">0 revisits logged</div>
    </div>
    <div class="toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input class="search-input" id="search-input" type="text" placeholder="Search name, address, territory…">
      </div>
      <button class="btn btn-ghost" id="sort-toggle-btn" title="Sort by most recently visited">
        <svg id="sort-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5h10M11 9h7M11 13h4"/><path d="m4 5 0 14M4 5 1 8M4 5l3 3M4 19l-3-3M4 19l3-3"/></svg>
      </button>
      <button class="btn btn-primary" id="new-entry-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        New
      </button>
    </div>
    <div class="entries" id="entries-list"></div>
  </div>

  <!-- SETTINGS PANEL -->
  <div class="panel" id="panel-settings">
    <div class="panel-header">
      <div>
        <div class="panel-eyebrow">Appearance</div>
        <div class="panel-title">Settings</div>
      </div>
    </div>
    <div class="theme-grid" id="theme-grid"></div>

    <div class="settings-section-label">Maps</div>
    <div class="glass settings-card">
      <div class="settings-row">
        <div>
          <div class="settings-row-title">Open addresses in</div>
          <div class="settings-row-sub">Used by the map pin buttons on each entry</div>
        </div>
        <div class="tabs" id="maps-toggle">
          <button class="tab-btn" data-provider="google">Google</button>
          <button class="tab-btn" data-provider="apple">Apple</button>
        </div>
      </div>
    </div>

    <div class="settings-section-label">Data</div>
    <div class="glass settings-card">
      <div class="settings-row">
        <div>
          <div class="settings-row-title">Backup your data</div>
          <div class="settings-row-sub">Save a copy, or restore from a previous backup</div>
        </div>
      </div>
      <div class="backup-actions">
        <button class="btn btn-ghost btn-sm" id="export-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
          Export Backup
        </button>
        <button class="btn btn-ghost btn-sm" id="import-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21V9"/><path d="m7 14 5-5 5 5"/><path d="M5 3h14"/></svg>
          Import Backup
        </button>
        <input type="file" id="import-file" accept="application/json" hidden>
      </div>
    </div>
  </div>
</div>

<div class="toast glass" id="toast"></div>

<div class="overlay" id="confirm-overlay">
  <div class="confirm-box glass">
    <p id="confirm-text">Delete this entry?</p>
    <div class="confirm-actions">
      <button class="btn btn-ghost btn-sm" id="confirm-cancel">Cancel</button>
      <button class="btn btn-danger btn-sm" id="confirm-ok">Delete</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  const THEMES = [
    { id:'sage', name:'Sage', grad:'linear-gradient(135deg,#a9cf95,#5f8a4e)' },
    { id:'ocean', name:'Ocean', grad:'linear-gradient(135deg,#7fc6d8,#1c7089)' },
    { id:'earth', name:'Earth', grad:'linear-gradient(135deg,#e0b184,#b1602e)' },
    { id:'forest', name:'Forest', grad:'linear-gradient(135deg,#3d7350,#16261b)' },
    { id:'pinkblack', name:'Pink & Black', grad:'linear-gradient(135deg,#ffb6d9,#ff4f9c)' },
    { id:'mono', name:'Monochrome', grad:'linear-gradient(135deg,#ffffff,#1a1a1a)' },
  ];

  let entries = [];
  let settings = { theme: 'sage', mapsProvider: 'google' };
  let openId = null;
  let editMode = false;
  let drafts = {};
  let expandedVisitId = null;
  let newVisitNotes = {};
  let searchQuery = '';
  let sortDir = 'desc'; // 'desc' = most recently visited first, 'asc' = oldest visited first
  let activeCalendar = null;

  const $ = (sel, ctx) => (ctx||document).querySelector(sel);
  const $$ = (sel, ctx) => Array.from((ctx||document).querySelectorAll(sel));
  const uid = () => 'e' + Date.now().toString(36) + Math.random().toString(36).slice(2,8);
  const pad = n => String(n).padStart(2,'0');

  function todayISO(){ const d = new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
  function parseISO(iso){ const [y,m,d] = iso.split('-').map(Number); return new Date(y, m-1, d); }
  function formatDate(iso){ if(!iso) return ''; return parseISO(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
  function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  /* ---------- STORAGE ---------- */
  const LS_ENTRIES_KEY = 'fieldServiceTracker_entries';
  const LS_SETTINGS_KEY = 'fieldServiceTracker_settings';

  async function loadData(){
    try{
      const raw = localStorage.getItem(LS_ENTRIES_KEY);
      if(raw) entries = JSON.parse(raw);
    }catch(e){ entries = []; }
    try{
      const raw = localStorage.getItem(LS_SETTINGS_KEY);
      if(raw) settings = JSON.parse(raw);
    }catch(e){ settings = { theme:'sage', mapsProvider:'google' }; }
    if(!settings.mapsProvider) settings.mapsProvider = 'google';
    applyTheme(settings.theme || 'sage');
    renderThemeGrid();
    renderMapsToggle();
    renderEntries();
  }
  async function persistEntries(){
    try{ localStorage.setItem(LS_ENTRIES_KEY, JSON.stringify(entries)); }
    catch(e){ showToast('Could not save — storage unavailable'); }
  }
  async function persistSettings(){
    try{ localStorage.setItem(LS_SETTINGS_KEY, JSON.stringify(settings)); }
    catch(e){ showToast('Could not save theme'); }
  }

  /* ---------- THEME ---------- */
  function applyTheme(id){
    document.documentElement.setAttribute('data-theme', id);
  }
  function renderThemeGrid(){
    const grid = $('#theme-grid');
    grid.innerHTML = THEMES.map(t => `
      <div class="theme-card glass ${settings.theme===t.id?'selected':''}" data-theme-id="${t.id}">
        <div class="theme-preview" style="background:${t.grad}"></div>
        <div class="theme-name">${t.name}</div>
        <div class="theme-check">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        </div>
      </div>
    `).join('');
    $$('.theme-card', grid).forEach(card => {
      card.addEventListener('click', () => {
        settings.theme = card.dataset.themeId;
        applyTheme(settings.theme);
        renderThemeGrid();
        persistSettings();
      });
    });
  }

  function renderMapsToggle(){
    $$('#maps-toggle .tab-btn').forEach(btn => {
      btn.classList.toggle('active', settings.mapsProvider === btn.dataset.provider);
    });
  }
  $$('#maps-toggle .tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      settings.mapsProvider = btn.dataset.provider;
      renderMapsToggle();
      persistSettings();
    });
  });

  /* ---------- BACKUP ---------- */
  function exportBackup(){
    const payload = {
      app: 'field-service-tracker',
      exportedAt: new Date().toISOString(),
      entries,
      settings
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = todayISO();
    a.href = url;
    a.download = `field-service-tracker-backup-${stamp}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    showToast('Backup exported');
  }

  function importBackup(file){
    const reader = new FileReader();
    reader.onload = () => {
      let data;
      try{ data = JSON.parse(reader.result); }
      catch(e){ showToast('That file isn\'t valid backup data'); return; }
      const incoming = Array.isArray(data) ? data : data.entries;
      if(!Array.isArray(incoming)){ showToast('That file isn\'t valid backup data'); return; }
      showConfirm(`Replace your current ${entries.length} entr${entries.length===1?'y':'ies'} with ${incoming.length} from this backup?`, 'Import', 'btn-primary', () => {
        entries = incoming;
        if(data.settings && typeof data.settings === 'object'){
          settings = Object.assign({ theme:'sage', mapsProvider:'google' }, data.settings);
          applyTheme(settings.theme);
          renderThemeGrid();
          renderMapsToggle();
          persistSettings();
        }
        openId = null;
        persistEntries();
        renderEntries();
        showToast('Backup imported');
      });
    };
    reader.onerror = () => showToast('Could not read that file');
    reader.readAsText(file);
  }

  $('#export-btn').addEventListener('click', exportBackup);
  $('#import-btn').addEventListener('click', () => $('#import-file').click());
  $('#import-file').addEventListener('change', ev => {
    const file = ev.target.files[0];
    if(file) importBackup(file);
    ev.target.value = '';
  });

  /* ---------- TABS ---------- */
  $$('.topbar .tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      $$('.topbar .tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      $$('.panel').forEach(p => p.classList.remove('active'));
      $('#panel-' + btn.dataset.tab).classList.add('active');
    });
  });

  /* ---------- ENTRIES ---------- */
  function filteredEntries(){
    const q = searchQuery.trim().toLowerCase();
    let list = entries.slice().sort((a, b) => {
      const av = (a.visits && a.visits.length) ? a.visits[0].date : null;
      const bv = (b.visits && b.visits.length) ? b.visits[0].date : null;
      if(av && bv) return sortDir === 'desc' ? bv.localeCompare(av) : av.localeCompare(bv);
      if(av && !bv) return -1;
      if(!av && bv) return 1;
      return (b.createdAt || '').localeCompare(a.createdAt || '');
    });
    if(!q) return list;
    return list.filter(e =>
      (e.name||'').toLowerCase().includes(q) ||
      (e.address||'').toLowerCase().includes(q) ||
      (e.territory||'').toLowerCase().includes(q)
    );
  }

  function renderEntries(){
    const list = filteredEntries();
    const container = $('#entries-list');
    const totalVisits = entries.reduce((sum, e) => sum + (e.visits ? e.visits.length : 0), 0);
    $('#entry-count').textContent = `${totalVisits} revisit${totalVisits===1?'':'s'} logged`;

    if(entries.length === 0){
      container.innerHTML = `
        <div class="empty-state glass">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M6 21V8l6-4 6 4v13"/><path d="M10 21v-6h4v6"/></svg>
          <p>No doors knocked yet. Tap "New" to log your first stop.</p>
        </div>`;
      return;
    }
    if(list.length === 0){
      container.innerHTML = `<div class="empty-state glass"><p>No matches for "${escapeHtml(searchQuery)}".</p></div>`;
      return;
    }

    container.innerHTML = list.map(e => renderEntryCard(e)).join('');

    list.forEach(e => {
      const card = $(`.entry[data-id="${e.id}"]`);
      $('.entry-row', card).addEventListener('click', () => toggleOpen(e.id));
      const rowMapBtn = $('.map-btn', card);
      if(rowMapBtn){
        rowMapBtn.addEventListener('click', ev => { ev.stopPropagation(); openInMaps(rowMapBtn.dataset.address); });
      }

      if(openId !== e.id) return;

      if(editMode){
        const draft = drafts[e.id];
        $('.f-name', card).addEventListener('input', ev => draft.name = ev.target.value);
        $('.f-phone', card).addEventListener('input', ev => { formatPhone(ev.target); draft.phone = ev.target.value; });
        $('.f-territory', card).addEventListener('input', ev => draft.territory = ev.target.value);
        $('.f-address', card).addEventListener('input', ev => draft.address = ev.target.value);
        $('.f-notes', card).addEventListener('input', ev => draft.notes = ev.target.value);
        $('.f-map-btn', card).addEventListener('click', ev => { ev.stopPropagation(); openInMaps(draft.address); });

        $('.entry-save', card).addEventListener('click', ev => { ev.stopPropagation(); saveEntry(e.id); });
        $('.entry-cancel', card).addEventListener('click', ev => { ev.stopPropagation(); cancelEdit(e.id); });
        $('.entry-delete', card).addEventListener('click', ev => { ev.stopPropagation(); confirmDelete(e.id); });

        $$('.visit-notes-input', card).forEach(ta => {
          ta.addEventListener('input', ev => {
            const v = draft.visits.find(x => x.id === ta.dataset.vid);
            if(v) v.notes = ev.target.value;
          });
        });
        $$('.visit-del', card).forEach(btn => {
          btn.addEventListener('click', ev => { ev.stopPropagation(); deleteVisit(e.id, btn.dataset.vid); });
        });
      } else {
        $('.edit-pencil-btn', card).addEventListener('click', ev => { ev.stopPropagation(); enterEditMode(e.id); });
        $('.new-visit-notes', card).addEventListener('input', ev => { newVisitNotes[e.id] = ev.target.value; });
        $('.add-visit-btn', card).addEventListener('click', ev => { ev.stopPropagation(); addVisitToday(e.id); });
        $('.pick-visit-date-btn', card).addEventListener('click', ev => { ev.stopPropagation(); addVisitCustom(e.id, ev.currentTarget); });
        $$('.visit-row', card).forEach(row => {
          row.addEventListener('click', ev => {
            ev.stopPropagation();
            const vid = row.dataset.vid;
            expandedVisitId = expandedVisitId === vid ? null : vid;
            renderEntries();
          });
        });
      }
    });
  }

  function renderEntryCard(e){
    const isOpen = openId === e.id;
    const draft = (isOpen && editMode) ? drafts[e.id] : null;
    const badgeText = (e.territory || '—').toString().slice(0,4);
    const subParts = [e.phone, e.address].filter(Boolean).join(' · ');

    let panelHtml = '';
    if(isOpen && editMode && draft){
      panelHtml = `
      <div class="entry-form">
        <div class="entry-form-inner">
          <div class="visit-panel-head">
            <div class="visit-panel-title">Edit Details</div>
          </div>
          <div class="field-grid">
            <div class="field">
              <label>Name</label>
              <input type="text" class="f-name" value="${escapeHtml(draft.name)}" placeholder="Full name">
            </div>
            <div class="field">
              <label>Phone</label>
              <input type="tel" class="f-phone" value="${escapeHtml(draft.phone)}" placeholder="(555) 555-0192">
            </div>
            <div class="field full">
              <label>Address</label>
              <div class="input-with-action">
                <input type="text" class="f-address" value="${escapeHtml(draft.address)}" placeholder="42 Elm Street">
                <button type="button" class="field-action-btn f-map-btn" title="Open in Maps">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 6-9 13-9 13s-9-7-9-13a9 9 0 0 1 18 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                </button>
              </div>
            </div>
            <div class="field">
              <label>Territory #</label>
              <input type="text" class="f-territory" value="${escapeHtml(draft.territory)}" placeholder="12">
            </div>
            <div class="field full">
              <label>General Notes</label>
              <textarea class="f-notes" placeholder="Gate codes, general reminders…">${escapeHtml(draft.notes)}</textarea>
            </div>
          </div>
          <div class="field full" style="margin-bottom:14px;">
            <label>Visit Notes</label>
            <div class="visit-log">
              ${(draft.visits && draft.visits.length) ? draft.visits.map((v,i) => `
                <div class="visit-edit-item">
                  <div class="visit-edit-head">
                    <span class="visit-num">#${draft.visits.length - i}</span>
                    <span class="visit-date">${formatDate(v.date)}</span>
                    <button type="button" class="visit-del" data-vid="${v.id}" title="Remove visit">&times;</button>
                  </div>
                  <textarea class="visit-notes-input" data-vid="${v.id}" placeholder="Notes for this visit…">${escapeHtml(v.notes||'')}</textarea>
                </div>`).join('') : '<div class="visit-empty">No visits logged yet.</div>'}
            </div>
          </div>
          <div class="entry-actions">
            <button class="btn btn-danger btn-sm entry-delete" type="button">Delete</button>
            <button class="btn btn-ghost btn-sm entry-cancel" type="button">Cancel</button>
            <button class="btn btn-primary btn-sm entry-save" type="button">Save</button>
          </div>
        </div>
      </div>`;
    } else if(isOpen){
      const visits = e.visits || [];
      panelHtml = `
      <div class="entry-form">
        <div class="entry-form-inner">
          <div class="visit-panel-head">
            <div class="visit-panel-title">${e.name ? escapeHtml(e.name) : 'Visit history'}</div>
            <button type="button" class="icon-btn edit-pencil-btn" title="Edit details">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
            </button>
          </div>

          <div class="general-notes-box">
            <div class="general-notes-label">General Notes</div>
            <div class="general-notes-text">${e.notes && e.notes.trim() ? escapeHtml(e.notes).replace(/\n/g,'<br>') : ''}</div>
          </div>

          <div class="new-visit-box">
            <textarea class="new-visit-notes" placeholder="Notes for this visit (optional)">${escapeHtml(newVisitNotes[e.id] || '')}</textarea>
            <div class="visit-add-row">
              <button type="button" class="btn btn-primary btn-sm add-visit-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
                Add Visit (Today)
              </button>
              <button type="button" class="field-action-btn pick-visit-date-btn" title="Choose a different date">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
              </button>
            </div>
          </div>

          <div class="visit-log compact">
            ${visits.length ? visits.map((v,i) => {
              const expanded = expandedVisitId === v.id;
              return `
              <div class="visit-row ${expanded?'expanded':''}" data-vid="${v.id}">
                <div class="visit-row-head">
                  <span class="visit-num">#${visits.length - i}</span>
                  <span class="visit-date">${formatDate(v.date)}</span>
                  ${v.notes ? '<span class="visit-dot" title="Has notes"></span>' : ''}
                  <svg class="visit-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                </div>
                ${expanded ? `<div class="visit-row-notes">${v.notes ? escapeHtml(v.notes).replace(/\n/g,'<br>') : '<em>No notes for this visit.</em>'}</div>` : ''}
              </div>`;
            }).join('') : '<div class="visit-empty">No visits logged yet.</div>'}
          </div>
        </div>
      </div>`;
    }

    return `
    <div class="entry glass ${isOpen?'open':''}" data-id="${e.id}">
      <div class="entry-row">
        <div class="badge">${escapeHtml(badgeText)}</div>
        <div class="entry-main">
          <div class="entry-name">${escapeHtml(e.name) || 'Unnamed'}</div>
          <div class="entry-sub">${escapeHtml(subParts) || 'No details yet'}</div>
          ${(e.visits && e.visits.length) ? `
          <div class="entry-dates">
            <span class="tag">${e.visits.length} visit${e.visits.length===1?'':'s'}</span>
            <span class="tag">Last ${formatDate(e.visits[0].date)}</span>
          </div>` : ''}
        </div>
        ${e.address ? `<button type="button" class="row-action-btn map-btn" title="Open in Maps" data-address="${escapeHtml(e.address)}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 6-9 13-9 13s-9-7-9-13a9 9 0 0 1 18 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        </button>` : ''}
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      ${panelHtml}
    </div>`;
  }

  function toggleOpen(id){
    closeCalendar();
    if(openId === id){
      openId = null;
      editMode = false;
      delete drafts[id];
      delete newVisitNotes[id];
      expandedVisitId = null;
    } else {
      openId = id;
      editMode = false;
      expandedVisitId = null;
      newVisitNotes[id] = '';
      delete drafts[id];
    }
    renderEntries();
  }

  function enterEditMode(id){
    const e = entries.find(x => x.id === id);
    drafts[id] = Object.assign({}, e, { visits: (e.visits || []).map(v => Object.assign({}, v)) });
    editMode = true;
    renderEntries();
  }

  function findDuplicate(draft, excludeId){
    const normName = (draft.name || '').trim().toLowerCase();
    const normAddr = (draft.address || '').trim().toLowerCase();
    if(!normName || !normAddr) return null;
    return entries.find(x =>
      x.id !== excludeId &&
      (x.name || '').trim().toLowerCase() === normName &&
      (x.address || '').trim().toLowerCase() === normAddr
    );
  }

  function finalizeSave(id){
    const e = entries.find(x => x.id === id);
    const draft = drafts[id];
    let toastMsg = 'Saved';
    if(!draft.visits || draft.visits.length === 0){
      draft.visits = [{ id: uid(), date: todayISO(), notes: '' }];
      toastMsg = 'Saved — first visit logged for today';
    }
    Object.assign(e, draft, { updatedAt: new Date().toISOString() });
    delete drafts[id];
    openId = null;
    editMode = false;
    persistEntries();
    renderEntries();
    showToast(toastMsg);
  }

  function saveEntry(id){
    const draft = drafts[id];
    if(!draft.name.trim()){
      showToast('Add a name before saving');
      return;
    }
    const dup = findDuplicate(draft, id);
    if(dup){
      showConfirm(`"${dup.name}" is already logged at this address. Save anyway?`, 'Save Anyway', 'btn-primary', () => finalizeSave(id));
      return;
    }
    finalizeSave(id);
  }

  function cancelEdit(id){
    const e = entries.find(x => x.id === id);
    const isBlank = !e.name && !e.phone && !e.address && !e.territory && !e.notes && (!e.visits || e.visits.length === 0);
    delete drafts[id];
    openId = null;
    editMode = false;
    if(isBlank){
      entries = entries.filter(x => x.id !== id);
    }
    renderEntries();
  }

  function addVisitToday(entryId){
    const e = entries.find(x => x.id === entryId);
    if(!e.visits) e.visits = [];
    const iso = todayISO();
    const notes = (newVisitNotes[entryId] || '').trim();
    e.visits.unshift({ id: uid(), date: iso, notes });
    e.visits.sort((a,b) => b.date.localeCompare(a.date));
    e.updatedAt = new Date().toISOString();
    newVisitNotes[entryId] = '';
    persistEntries();
    renderEntries();
    showToast('Visit logged for today');
  }

  function addVisitCustom(entryId, triggerEl){
    openCalendar(triggerEl, '', (iso) => {
      if(!iso) return;
      const e = entries.find(x => x.id === entryId);
      if(!e.visits) e.visits = [];
      const notes = (newVisitNotes[entryId] || '').trim();
      e.visits.unshift({ id: uid(), date: iso, notes });
      e.visits.sort((a,b) => b.date.localeCompare(a.date));
      e.updatedAt = new Date().toISOString();
      newVisitNotes[entryId] = '';
      persistEntries();
      renderEntries();
      showToast('Visit logged');
    });
  }

  function openInMaps(address){
    if(!address || !address.trim()) { showToast('Add an address first'); return; }
    const q = encodeURIComponent(address.trim());
    const url = settings.mapsProvider === 'apple'
      ? `https://maps.apple.com/?q=${q}`
      : `https://www.google.com/maps/search/?api=1&query=${q}`;
    window.open(url, '_blank', 'noopener');
  }

  function deleteVisit(entryId, visitId){
    const e = entries.find(x => x.id === entryId);
    if(!e || !e.visits) return;
    const idx = e.visits.findIndex(v => v.id === visitId);
    if(idx > -1) e.visits.splice(idx, 1);
    e.updatedAt = new Date().toISOString();
    if(editMode && openId === entryId && drafts[entryId]){
      drafts[entryId].visits = e.visits.map(v => Object.assign({}, v));
    }
    persistEntries();
    renderEntries();
  }

  let pendingConfirmAction = null;
  function showConfirm(text, okLabel, okClass, onConfirm){
    $('#confirm-text').textContent = text;
    const okBtn = $('#confirm-ok');
    okBtn.textContent = okLabel;
    okBtn.className = 'btn btn-sm ' + okClass;
    pendingConfirmAction = onConfirm;
    $('#confirm-overlay').classList.add('show');
  }
  function confirmDelete(id){
    showConfirm('Delete this entry? This can\'t be undone.', 'Delete', 'btn-danger', () => {
      entries = entries.filter(x => x.id !== id);
      delete drafts[id];
      openId = null;
      persistEntries();
      renderEntries();
      showToast('Deleted');
    });
  }
  $('#confirm-cancel').addEventListener('click', () => {
    $('#confirm-overlay').classList.remove('show');
    pendingConfirmAction = null;
  });
  $('#confirm-ok').addEventListener('click', () => {
    const action = pendingConfirmAction;
    $('#confirm-overlay').classList.remove('show');
    pendingConfirmAction = null;
    if(action) action();
  });

  $('#new-entry-btn').addEventListener('click', () => {
    const e = { id: uid(), name:'', phone:'', address:'', territory:'', notes:'', visits: [], createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
    entries.unshift(e);
    openId = e.id;
    editMode = true;
    drafts[e.id] = Object.assign({}, e, { visits: [] });
    searchQuery = '';
    $('#search-input').value = '';
    renderEntries();
    const card = $(`.entry[data-id="${e.id}"]`);
    if(card){
      card.scrollIntoView({ behavior:'smooth', block:'center' });
      const nameInput = $('.f-name', card);
      if(nameInput) setTimeout(() => nameInput.focus(), 150);
    }
  });

  $('#search-input').addEventListener('input', ev => {
    searchQuery = ev.target.value;
    renderEntries();
  });

  $('#sort-toggle-btn').addEventListener('click', () => {
    sortDir = sortDir === 'desc' ? 'asc' : 'desc';
    const btn = $('#sort-toggle-btn');
    btn.classList.toggle('asc', sortDir === 'asc');
    btn.title = sortDir === 'desc' ? 'Sort by most recently visited' : 'Sort by oldest visited';
    renderEntries();
  });

  function formatPhone(input){
    let digits = input.value.replace(/\D/g,'').slice(0,10);
    let out = digits;
    if(digits.length > 6) out = `(${digits.slice(0,3)}) ${digits.slice(3,6)}-${digits.slice(6)}`;
    else if(digits.length > 3) out = `(${digits.slice(0,3)}) ${digits.slice(3)}`;
    else if(digits.length > 0) out = `(${digits.slice(0,3)}`;
    input.value = out;
  }

  /* ---------- CALENDAR POPOVER ---------- */
  function closeCalendar(){
    if(activeCalendar){ activeCalendar.remove(); activeCalendar = null; }
    document.removeEventListener('click', onDocClick, true);
  }
  function onDocClick(ev){
    if(activeCalendar && !activeCalendar.contains(ev.target)){
      closeCalendar();
    }
  }
  function openCalendar(triggerEl, currentISO, onSelect){
    closeCalendar();
    const base = currentISO ? parseISO(currentISO) : new Date();
    let viewY = base.getFullYear(), viewM = base.getMonth();

    const pop = document.createElement('div');
    pop.className = 'cal-popover glass';
    document.body.appendChild(pop);
    activeCalendar = pop;

    function draw(){
      const first = new Date(viewY, viewM, 1);
      const startDow = first.getDay();
      const daysInMonth = new Date(viewY, viewM+1, 0).getDate();
      const daysInPrev = new Date(viewY, viewM, 0).getDate();
      const monthLabel = first.toLocaleDateString('en-US', { month:'long', year:'numeric' });
      const todayStr = todayISO();

      let cells = '';
      for(let i=startDow-1; i>=0; i--){
        cells += `<div class="cal-day dim">${daysInPrev-i}</div>`;
      }
      for(let d=1; d<=daysInMonth; d++){
        const iso = `${viewY}-${pad(viewM+1)}-${pad(d)}`;
        const cls = ['cal-day'];
        if(iso === todayStr) cls.push('today');
        if(iso === currentISO) cls.push('selected');
        cells += `<div class="${cls.join(' ')}" data-iso="${iso}">${d}</div>`;
      }
      const total = startDow + daysInMonth;
      const trailing = (7 - (total % 7)) % 7;
      for(let d=1; d<=trailing; d++){
        cells += `<div class="cal-day dim">${d}</div>`;
      }

      pop.innerHTML = `
        <div class="cal-head">
          <div class="cal-nav" id="cal-prev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></div>
          <div class="cal-label">${monthLabel}</div>
          <div class="cal-nav" id="cal-next"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></div>
        </div>
        <div class="cal-grid">
          <div class="cal-wd">S</div><div class="cal-wd">M</div><div class="cal-wd">T</div><div class="cal-wd">W</div><div class="cal-wd">T</div><div class="cal-wd">F</div><div class="cal-wd">S</div>
          ${cells}
        </div>
        <div class="cal-foot">
          <button type="button" id="cal-clear">Clear</button>
          <button type="button" id="cal-close">Close</button>
        </div>`;

      $('#cal-prev', pop).addEventListener('click', () => { viewM--; if(viewM<0){viewM=11; viewY--;} draw(); });
      $('#cal-next', pop).addEventListener('click', () => { viewM++; if(viewM>11){viewM=0; viewY++;} draw(); });
      $('#cal-clear', pop).addEventListener('click', () => { onSelect(''); closeCalendar(); });
      $('#cal-close', pop).addEventListener('click', () => closeCalendar());
      $$('.cal-day[data-iso]', pop).forEach(el => {
        el.addEventListener('click', () => { onSelect(el.dataset.iso); closeCalendar(); });
      });
    }
    draw();

    const rect = triggerEl.getBoundingClientRect();
    const popWidth = 264;
    let left = rect.left;
    if(left + popWidth > window.innerWidth - 12) left = window.innerWidth - popWidth - 12;
    if(left < 12) left = 12;
    let top = rect.bottom + 8;
    if(top + 320 > window.innerHeight){ top = Math.max(12, rect.top - 328); }
    pop.style.left = left + 'px';
    pop.style.top = top + 'px';

    setTimeout(() => document.addEventListener('click', onDocClick, true), 0);
  }

  /* ---------- TOAST ---------- */
  let toastTimer = null;
  function showToast(msg){
    const t = $('#toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  loadData();
})();
</script>
</body>
</html>
